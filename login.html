<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar — Livro-caixa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .auth-wrap {
    max-width: 360px;
    margin: 90px auto;
    padding: 0 24px;
  }
  .auth-card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px;
  }
  .auth-brand {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
  }
  .auth-brand span { color: var(--accent); }
  .auth-subtitle {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
  }
  .auth-message {
    font-size: 13px;
    margin-bottom: 14px;
    min-height: 18px;
    color: var(--danger);
  }
  .auth-message.ok { color: var(--accent); }
  .auth-toggle {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
  }
  .auth-toggle:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">Livro-<span>caixa</span></div>
    <div class="auth-subtitle" id="authTitle">Entrar</div>

    <form id="authForm">
      <div class="field">
        <label for="authEmail">E-mail</label>
        <input type="email" id="authEmail" required />
      </div>
      <div class="field">
        <label for="authPassword">Senha</label>
        <input type="password" id="authPassword" required minlength="6" />
      </div>
      <div class="auth-message" id="authMessage"></div>
      <button type="submit" class="btn primary" style="width:100%;" id="authSubmit">Entrar</button>
    </form>
    <a href="#" class="auth-toggle" id="toggleMode">Não tem conta? Criar uma</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="supabase-client.js"></script>
<script src="login.js"></script>
</body>
</html>
