<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Livro-caixa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">Livro-<span>caixa</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="month-nav">
        <button id="prevMonth" aria-label="Mês anterior">‹</button>
        <div class="month-label" id="monthLabel">junho 2026</div>
        <button id="nextMonth" aria-label="Próximo mês">›</button>
      </div>
      <a class="page-nav" href="contas-fixas.html">Contas fixas →</a>
    </div>
  </header>

  <section class="summary" id="summary"></section>

  <div class="section-title">
    Contas do mês
    <button class="btn primary" id="addExpenseBtn">+ conta</button>
  </div>
  <div class="panel">
    <table class="ledger" id="expenseTable">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>Descrição</th>
          <th class="meta">Vencimento</th>
          <th class="amount">Valor</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expenseBody"></tbody>
    </table>
  </div>

  <div class="section-title">
    Receitas do mês
    <button class="btn primary" id="addIncomeBtn">+ receita</button>
  </div>
  <div class="panel">
    <table class="ledger" id="incomeTable">
      <thead>
        <tr>
          <th>Categoria</th>
          <th class="meta">Recebido em</th>
          <th class="amount">Valor</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="incomeBody"></tbody>
    </table>
  </div>

  <div class="section-title">Visão anual — <span id="yearLabel"></span></div>
  <div class="panel year-panel">
    <div class="bars" id="yearBars"></div>
  </div>

  <footer class="note">Os dados ficam salvos apenas neste navegador (localStorage).</footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
